<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TCG Peaks</title>
<link href="https://fonts.googleapis.com/css2?family=Bangers&family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
:root{
  --poke-red:#E3350D;--poke-blue:#2B5CE6;--poke-yellow:#FFCB05;--poke-dark:#1A1A2E;
  --op-red:#C41E3A;--op-gold:#D4A017;--op-navy:#0D1B3E;--op-ocean:#1B6CA8;
  --psa:#D4002A;--cgc:#007AC3;--bgs:#7B3F00;--tag:#1B5E20;
  --bg:#0A0A14;--surface:#12121F;--surface2:#1A1A2E;--surface3:#22223A;
  --border:rgba(255,255,255,0.07);--text:#F2F2FF;--muted:#7B7B9A;
  --success:#22C55E;--warn:#F59E0B;--danger:#EF4444;--radius:12px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:'Nunito',sans-serif;min-height:100vh;overflow-x:hidden;}
#bg-canvas{position:fixed;inset:0;z-index:0;pointer-events:none;opacity:0.3;}

/* ─── MODAL SYSTEM ─── */
.modal-backdrop{position:fixed;inset:0;z-index:1000;display:none;align-items:center;justify-content:center;background:rgba(10,10,20,.88);backdrop-filter:blur(10px);}
.modal-backdrop.open{display:flex;}
.modal-card{width:min(480px,94vw);background:var(--surface);border:1px solid rgba(255,255,255,0.1);border-radius:20px;padding:2.5rem 2rem;box-shadow:0 0 80px rgba(43,92,230,.18),0 0 40px rgba(227,53,13,.08);animation:pop .35s cubic-bezier(.34,1.56,.64,1);position:relative;max-height:90vh;overflow-y:auto;}
@keyframes pop{from{transform:scale(.9) translateY(16px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
.modal-close{position:absolute;top:1rem;right:1.25rem;background:none;border:none;color:var(--muted);font-size:1.4rem;cursor:pointer;z-index:2;}
.modal-close:hover{color:var(--text);}
.modal-logo{text-align:center;margin-bottom:1.75rem;}
.modal-logo .brand{font-family:'Bangers',cursive;font-size:3rem;letter-spacing:4px;}
.modal-logo .brand .tcg{color:var(--poke-yellow);}
.modal-logo .tagline{font-size:.72rem;color:var(--muted);letter-spacing:2px;text-transform:uppercase;margin-top:.2rem;}

/* ─── AUTH MODAL ─── */
.login-tabs{display:flex;background:var(--surface2);border-radius:8px;padding:3px;margin-bottom:1.5rem;}
.login-tab{flex:1;padding:.5rem;border:none;background:none;color:var(--muted);font-family:'Nunito',sans-serif;font-weight:700;font-size:.85rem;border-radius:6px;cursor:pointer;transition:all .2s;}
.login-tab.active{background:var(--surface3);color:var(--text);}
.f-row{display:flex;flex-direction:column;gap:.35rem;margin-bottom:.9rem;}
.f-row label{font-size:.72rem;font-weight:800;color:var(--muted);letter-spacing:.5px;text-transform:uppercase;}
.f-input{padding:.65rem 1rem;background:var(--surface2);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:'Nunito',sans-serif;font-size:.9rem;width:100%;transition:border-color .15s;}
.f-input:focus{outline:none;border-color:var(--poke-blue);}
.submit-btn{width:100%;padding:.8rem;border:none;border-radius:10px;font-family:'Bangers',cursive;font-size:1.25rem;letter-spacing:2px;
